name = "trainforge-api"
main = "src/worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "trainforge-db"
database_id = "local-dev-placeholder"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "local-dev-cache-placeholder"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "trainforge-media"

# Uncomment for production async plan generation
[[queues.producers]]
binding = "PLAN_QUEUE"
queue = "plan-generation"

[[queues.consumers]]
queue = "plan-generation"
max_batch_size = 1

[dev]
port = 2020

[triggers]
crons = ["0 */6 * * *"]

# Local dev runs plan jobs inline when queue consumer is unavailable
