# Production Worker (default for deploy + Cloudflare CI)

name = "trainforge-api"
main = "src/worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_URL = "https://trainforge.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "trainforge-db"
database_id = "4bc2cff2-ba91-4da7-a30a-6498c0ce7d81"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "99cfd606c42b4f989ee525e2cc04f792"

[[queues.producers]]
binding = "PLAN_QUEUE"
queue = "plan-generation"

[[queues.consumers]]
queue = "plan-generation"
max_batch_size = 1

[triggers]
crons = ["0 */6 * * *"]

# R2 binding omitted until R2 is enabled on the Cloudflare account.
# Secrets via: wrangler secret put ANTHROPIC_API_KEY
